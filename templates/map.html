<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map — PathPulse AI</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <style>
    /* Full screen map styles */
    .map-section {
      padding-top: 100px;
      padding-bottom: 0;
      max-width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .section-header {
      padding: 0 32px;
    }

    .map-container {
      flex: 1;
      height: 100%;
      border-radius: 0;
      border-left: none;
      border-right: none;
      border-bottom: none;
    }

    #main-map {
      height: 100% !important;
      width: 100%;
    }

    body {
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div class="bg-mesh"></div>

  <!-- ── Navbar ──────────────────────────────────────────────────── -->
  <nav class="navbar" id="navbar">
    <a href="/" class="navbar-brand">
      <div class="logo-icon">
        <img src="{{ url_for('static', filename='img/icon-192.png') }}" alt="PathPulse Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: inherit;">
      </div>
      <div>
        <h1>PathPulse</h1>
        <span>AI Pothole Detection</span>
      </div>
    </a>
    <ul class="nav-links">
      <li><a href="/">Dashboard</a></li>
      <li><a href="/map" class="active">Map</a></li>
      <li><a href="/detect">Start Ride</a></li>
    </ul>
  </nav>

  <!-- ── Map ─────────────────────────────────────────────────────── -->
  <section class="map-section" id="map-section">
    <div class="section-header">
      <h3>🗺️ Live <span class="gradient-text">Pothole Map</span></h3>
      <div class="map-controls">
        <div class="search-container">
          <input type="text" id="map-search" placeholder="Search destination..." autocomplete="off">
          <div id="search-suggestions" class="search-suggestions"></div>
        </div>
        <button class="btn btn-primary btn-sm" id="btn-locate" onclick="locateUser()">
          📍 My Location
        </button>
        <button class="btn btn-secondary btn-sm" id="btn-refresh-map" onclick="refreshMap()">
          🔄 Refresh Map
        </button>
      </div>
    </div>
    <div class="map-container">
      <div id="route-info" class="route-info">
        🛣️ Route: <span id="route-distance" style="font-weight: 800; color: var(--accent);">0</span> km
        <button onclick="clearRoute()"
          style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:1.1rem;margin-left:12px;padding:4px;"
          title="Clear Route">✖</button>
      </div>
      <div id="main-map"></div>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
  <script src="{{ url_for('static', filename='js/map.js') }}"></script>
  <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js')
    .then(() => console.log("Service Worker Registered"));
}
</script>
</body>

</html>
